<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;

            /* Background Image */
            background: url("https://chironit.com/wp-content/uploads/2025/05/Post-2_for-site.jpg") no-repeat center center/cover;

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.15);
            z-index: 0;
        }

        .otp-box {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.42);
            text-align: center;

            position: relative;
            z-index: 1;
        }

        .otp-box h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .otp-box p {
            font-size: 13px;
            color: gray;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            text-align: center;
            letter-spacing: 5px;
        }

        input[type="text"]:focus {
            border-color: #4facfe;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        .msg {
            margin-top: 10px;
            font-size: 13px;
        }

        .error { color: red; }
        .success { color: green; }

    
/* Responsive Media Queries */
@media (max-width: 768px) {
    .navbar { flex-direction: column; padding: 15px; text-align: center; }
    .navbar ul { flex-wrap: wrap; justify-content: center; margin-top: 10px; gap: 10px; padding: 0; }
    .navbar ul li a { padding: 8px 10px; font-size: 0.9rem; }
    .container, .auth-container, .login-container { 
        margin: 20px auto !important; 
        padding: 20px !important; 
        width: 95% !important; 
        max-width: 100% !important; 
        border-radius: 15px !important; 
    }
    .content { padding: 20px !important; }
    .glass-card { padding: 20px !important; }
    h1 { font-size: 1.5rem !important; }
    h2 { font-size: 1.3rem !important; }
    .navbar-brand { font-size: 1.4rem !important; }
    table { font-size: 0.8rem; overflow-x: auto; display: block; }
    th, td { padding: 6px; }
    .upload-box { padding: 15px; }
    .toast-container { width: 90%; left: 5%; right: 5%; top: 10px; }
    img.preview-img { border-width: 2px; }
}

</style>
</head>

<body>

<div class="otp-box">

    <h2>🔐 Verify OTP</h2>
    <p>We sent a 6-digit OTP to your email</p>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="otp" maxlength="6" placeholder="Enter OTP" required>
        <button type="submit">Verify</button>
    </form>

    <!-- 🔥 IKKAḌA ADD CHEYYALI -->
    <p style="margin-top:12px; font-size:13px;">
        Didn't receive OTP?
        <a href="{% url 'resend_otp' %}" style="color:#007bff; text-decoration:none; font-weight:600;">
            Resend OTP
        </a>
    </p>

    {% for message in messages %}
        <div class="msg {% if message.tags == 'success' %}success{% else %}error{% endif %}">{{ message }}</div>
    {% endfor %}

</div>

</body>
</html>
