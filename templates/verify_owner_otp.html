<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            text-align: center;
            letter-spacing: 3px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .success {
            color: green;
            margin-top: 10px;
        }

        /* 🔥 WARNING BOX STYLE */
        .warning-box {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .resend-btn {
            background: #ff9800;
        }

        .resend-btn:hover {
            background: #e68900;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>🔐 OTP Verification</h2>
    <p>Enter the OTP sent to cheque owner</p>

    <!-- 🔴 WARNING MESSAGE (ADDED HERE) -->
    <div class="warning-box">
        ⚠️ If this is not you, take action immediately.
    </div>

    <!-- OTP FORM -->
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter OTP" required>

        <button type="submit">Verify OTP</button>
    </form>

    <br>

    <!-- ⭐ RESEND OTP BUTTON -->
    <a href="{% url 'resend_owner_otp' %}">
        <button type="button" class="resend-btn">
            Resend OTP
        </button>
    </a>

    <!-- MESSAGES -->
    {% if messages %}
        {% for message in messages %}
            <p class="{% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}
</div>

</body>
</html>
